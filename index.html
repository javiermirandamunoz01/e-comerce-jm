<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintendo Store | Premium E-commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger sticky-top shadow-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="assets/img/ninlog.jpg" alt="Logo" width="90">
                <span class="ms-2 fw-bold tracking-tighter">STORE</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navContent">
                <form class="d-flex mx-auto w-100 w-lg-50 my-2 my-lg-0" role="search">
                    <input id="buscador" class="form-control rounded-pill border-0 shadow-sm" type="search" placeholder="Buscar juegos, consolas y más..." aria-label="Search">
                </form>

                <div class="d-flex align-items-center justify-content-center">
                    <button class="btn btn-outline-light rounded-pill position-relative border-0" data-bs-toggle="modal" data-bs-target="#modalCarrito">
                        <span class="fs-5">🛒</span>
                        <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div id="heroCarousel" class="carousel slide carousel-fade mb-5" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?q=80&w=1200" class="d-block w-100 hero-img" alt="Zelda">
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1200" class="d-block w-100 hero-img" alt="Mario">
            </div>
        </div>
    </div>

    <div class="container mb-5">
        <div class="d-flex justify-content-center flex-wrap gap-2">
            <button class="btn btn-nintendo-filter active" data-cat="todos">Todos los productos</button>
            <button class="btn btn-nintendo-filter" data-cat="Juegos">Juegos</button>
            <button class="btn btn-nintendo-filter" data-cat="Consolas">Consolas</button>
            <button class="btn btn-nintendo-filter" data-cat="Accesorios">Accesorios</button>
        </div>
    </div>

    <main class="container">
        <div id="contenedor-productos" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            </div>
    </main>

    <div class="modal fade" id="modalCarrito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold">Mi Carrito</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul id="lista-carrito" class="list-group list-group-flush mb-3"></ul>
                    <div class="d-flex justify-content-between align-items-center p-2 bg-light rounded">
                        <span class="h5 mb-0">Total a pagar:</span>
                        <span class="h5 mb-0 text-danger fw-bold">$<span id="total-precio">0</span></span>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-light rounded-pill" id="vaciar-carrito">Vaciar</button>
                    <button class="btn btn-danger rounded-pill px-4">Comprar Ahora</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-5 mt-5">
        <div class="container">
            <img src="assets/img/ninlog.jpg" width="80" class= alt="Footer Logo">
            <p class="mb-0 opacity-50">&copy; 2026 Nintendo Store - Desarrollo Web Codegua</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
